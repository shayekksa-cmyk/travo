document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gn-items:center;justify-content:center;flex:none;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 12a8 8 0 0 1 14.5-4.6M20 12a8 8 0 0 1-14.5 4.6\" stroke=\"#5FA82E\" stroke-width=\"2.2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-weight:800;font-size:16.5px;color:#132318;margin-bottom:4px;\">دعم متواصل على مدار الساعة<\u002Fdiv>\n          <div style=\"font-size:14px;line-height:1.8;color:#6C8A76;\">فريق دعم جاهز للرد فوراً على أي استفسار أو طارئ.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== HOW IT WORKS ===== -->\n  <section id=\"how\" style=\"max-width:1200px;margin:0 auto;padding:20px 28px 120px;\">\n    <div style=\"text-align:center;max-width:640px;margin:0 auto 50px;\">\n      <div style=\"color:#5FA82E;font-weight:700;font-size:14px;letter-spacing:.08em;margin-bottom:10px;\">كيف يعمل<\u002Fdiv>\n      <h2 style=\"font-family:'Thmanyah','IBM Plex Sans Arabic';font-weight:800;font-size:34px;color:#132318;margin:0;line-height:1.3;\">رحلة آمنة في أربع خطوات<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;\">\n      <div class=\"stepCard\">\n        <div style=\"font-family:'Sora';font-weight:800;font-size:34px;color:#DCEACC;margin-bottom:14px;\">01<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:16.5px;color:#132318;margin-bottom:8px;\">سجّل بيانات الطالب<\u002Fdiv>\n        <div style=\"font-size:14px;line-height:1.8;color:#6C8A76;\">أنشئ الحساب وأضف معلومات المدرسة والعنوان.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stepCard\">\n        <div style=\"font-family:'Sora';font-weight:800;font-size:34px;color:#DCEACC;margin-bottom:14px;\">02<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:16.5px;color:#132318;margin-bottom:8px;\">حدّد الجدول<\u002Fdiv>\n        <div style=\"font-size:14px;line-height:1.8;color:#6C8A76;\">اختر مواعيد الذهاب والعودة الأسبوعية.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stepCard\">\n        <div style=\"font-family:'Sora';font-weight:800;font-size:34px;color:#DCEACC;margin-bottom:14px;\">03<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:16.5px;color:#132318;margin-bottom:8px;\">تابع الرحلة لحظياً<\u002Fdiv>\n        <div style=\"font-size:14px;line-height:1.8;color:#6C8A76;\">راقب موقع السائق منذ الانطلاق وحتى الوصول.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stepCard\">\n        <div style=\"font-family:'Sora';font-weight:800;font-size:34px;color:#DCEACC;margin-bottom:14px;\">04<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:16.5px;color:#132318;margin-bottom:8px;\">وصول آمن<\u002Fdiv>\n        <div style=\"font-size:14px;line-height:1.8;color:#6C8A76;\">إشعار فوري عند وصول الطالب بسلام.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CONTACT ===== -->\n  <section id=\"contact\" style=\"max-width:1200px;margin:0 auto;padding:20px 28px 120px;display:grid;grid-template-columns:0.9fr 1.1fr;gap:56px;align-items:start;\">\n    <div>\n      <div style=\"color:#5FA82E;font-weight:700;font-size:14px;letter-spacing:.08em;margin-bottom:10px;\">تواصل معنا<\u002Fdiv>\n      <h2 style=\"font-family:'Thmanyah','IBM Plex Sans Arabic';font-weight:800;font-size:34px;color:#132318;margin:0 0 18px;line-height:1.35;\">يسعدنا نسمع منك<\u002Fh2>\n      <p style=\"font-size:15px;line-height:1.9;color:#6C8A76;margin:0 0 28px;max-width:420px;\">لأي استفسار أو ملاحظة أو طلب دعم، راسلنا من النموذج وسيتواصل معك فريقنا في أقرب وقت.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <div style=\"width:40px;height:40px;border-radius:12px;background:#EEF7E4;display:flex;align-items:center;justify-content:center;flex:none;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0  style=\"color:#B9CCB9;font-size:16px;line-height:1.8;margin:0 0 34px;\">حمّل التطبيق الآن وابدأ رحلة آمنة لطلابك من اليوم الأول.<\u002Fp>\n      <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap;\">\n        <a href=\"#\" class=\"storeBadge\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M16.5 3c.2 1.3-.3 2.6-1.1 3.5-.8.9-2.1 1.6-3.3 1.5-.2-1.2.4-2.5 1.1-3.3C13.9 3.8 15.3 3.1 16.5 3ZM20.7 17.2c-.6 1.3-1 1.9-1.7 3-1 1.5-2.5 3.4-4.3 3.4-1.6 0-2-.9-4.1-.9-2.1 0-2.6.9-4.2.9-1.8 0-3.2-1.7-4.2-3.2C-.2 16.8-.7 11 1.3 8c1-1.5 2.6-2.5 4.4-2.5 1.7 0 2.8 1 4.2 1 1.4 0 2.2-1 4.2-1 1.5 0 3.1.8 4.2 2.2-3.7 2-3.1 7.3 2.4 9.5Z\"><\u002Fpath><\u002Fsvg>\n          <div>\n            <div style=\"font-size:10px;color:#B9CCB9;\">حمّله على<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:700;\">App Store<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n        <a href=\"#\" class=\"storeBadge\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M3 2.5v19l10-9.5-10-9.5ZM14 12l3.5-3.3L4.5 2.2 14 12ZM4.5 21.8 17.5 15.3 14 12l-9.5 9.8ZM18.5 8.6 15.3 12l3.2 3.4 4-2.1c1.1-.6 1.1-2.2 0-2.8l-4-2Z\"><\u002Fpath><\u002Fsvg>\n          <div>\n            <div style=\"font-size:10px;color:#B9CCB9;\">متوفر على<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:700;\">Google Play<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"border-top:1px solid #EEF2EA;padding:44px 28px;background:#FBFCFA;\">\n    <div style=\"max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <svg viewBox=\"0 0 120 120\" width=\"26\" height=\"26\" style=\"overflow:visible;flex:none;\">\n          <path d=\"M60 12C40.1 12 24 28.1 24 48c0 27 36 58 36 58s36-31 36-58c0-19.9-16.1-36-36-36Z\" fill=\"url(#navPin)\"><\u002Fpath>\n          <circle cx=\"60\" cy=\"46\" r=\"18.5\" fill=\"#FFFFFF\"><\u002Fcircle>\n          <circle cx=\"60\" cy=\"46\" r=\"8.5\" fill=\"#0E5C34\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div style=\"font-family:'Sora';font-weight:800;font-size:17px;color:#0E5C34;\">TRAVO<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:26px;flex-wrap:wrap;\">\n        <a class=\"navlinkLight\" href=\"#safety\">الأمان<\u002Fa>\n        <a class=\"navlinkLight\" href=\"#services\">الخدمات<\u002Fa>\n        <a class=\"navlinkLight\" href=\"#how\">كيف يعمل<\u002Fa>\n        <a class=\"navlinkLight\" href=\"#contact\">تواصل معنا<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-size:13px;color:#9AAA9C;\">© 2026 TRAVO. جميع الحقوق محفوظة.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { name: '', email: '', message: '', sent: false };\n\n  onNameChange = (e) => this.setState({ name: e.target.value });\n  onEmailChange = (e) => this.setState({ email: e.target.value });\n  onMessageChange = (e) => this.setState({ message: e.target.value });\n\n  handleSubmit = (e) => {\n    e.preventDefault();\n    const { name, email, message } = this.state;\n    const subject = encodeURIComponent('استفسار من موقع TRAVO — ' + name);\n    const body = encodeURIComponent(\n      'الاسم: ' + name + '\\n' +\n      'البريد الإلكتروني: ' + email + '\\n\\n' +\n      'الرسالة:\\n' + message\n    );\n    window.location.href = `mailto:SHAYEK.KSA@GMAIL.COM?subject=${subject}&body=${body}`;\n    this.setState({ sent: true });\n  };\n\n  renderVals() {\n    return {\n      name: this.state.name,\n      email: this.state.email,\n      message: this.state.message,\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      onNameChange: this.onNameChange,\n      onEmailChange: this.onEmailChange,\n      onMessageChange: this.onMessageChange,\n      handleSubmit: this.handleSubmit,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
